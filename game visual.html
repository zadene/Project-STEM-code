<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goosebumps Adventure - Visual & Teka-Teki</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .glow-green {
            text-shadow: 0 0 15px rgba(34, 197, 94, 0.8);
        }
        .story-gradient {
            background: linear-gradient(to top, rgba(3, 7, 18, 1) 15%, rgba(3, 7, 18, 0.4) 60%, rgba(3, 7, 18, 0.1) 100%);
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen flex flex-col justify-between select-none">

    <div id="book-selection-screen" class="container mx-auto max-w-4xl p-6 my-auto">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black text-green-500 tracking-widest uppercase glow-green mb-3">📖 PILIH BUKU GOOSEBUMPS</h1>
            <p class="text-gray-400 text-sm md:text-base">Pilih petualanganmu, pecahkan teka-tekinya, dan tentukan takdir hidup atau matimu!</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <button onclick="startBook('buku1')" class="bg-gray-900 border-2 border-red-950 hover:border-red-600 p-6 rounded-2xl text-left transition-all duration-300 transform hover:-translate-y-2 hover:shadow-2xl hover:shadow-red-950/40 group cursor-pointer">
                <span class="bg-red-950/60 text-red-400 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider border border-red-900">Misteri Mencekam</span>
                <h2 class="text-2xl font-bold mt-3 text-gray-200 group-hover:text-red-400 transition-colors">Rumah Berhantu Lereng Moga</h2>
                <p class="text-sm text-gray-400 mt-2 leading-relaxed">Malam berkabut tebal memaksa kamu berteduh di sebuah rumah kolonial tua yang terbengkalai. Sanggupkah kamu keluar hidup-hidup?</p>
            </button>

            <button onclick="startBook('buku2')" class="bg-gray-900 border-2 border-amber-950 hover:border-amber-600 p-6 rounded-2xl text-left transition-all duration-300 transform hover:-translate-y-2 hover:shadow-2xl hover:shadow-amber-950/40 group cursor-pointer">
                <span class="bg-amber-950/60 text-amber-400 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider border border-amber-900">Survival</span>
                <h2 class="text-2xl font-bold mt-3 text-gray-200 group-hover:text-amber-400 transition-colors">Ekspedisi Lembah Purba</h2>
                <p class="text-sm text-gray-400 mt-2 leading-relaxed">Tersesat di celah bumi terdalam yang dihuni predator prasejarah raksasa. Andalkan logikamu sebelum kamu menjadi santapan malam mereka!</p>
            </button>
        </div>
    </div>

    <div id="game-screen" class="hidden flex-1 container mx-auto max-w-3xl p-4 flex flex-col justify-between gap-4">
        
        <div class="flex justify-between items-center bg-gray-900/90 backdrop-blur p-3 rounded-xl border border-gray-800 shadow-md">
            <div class="flex items-center gap-2">
                <span class="text-lg">⚡</span>
                <h3 id="game-title" class="text-xs md:text-sm font-black text-green-400 tracking-wider uppercase">JUDUL BUKU</h3>
            </div>
            <button onclick="exitGame()" class="text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-1 rounded-lg border border-gray-700 transition cursor-pointer">
                🚪 Keluar
            </button>
        </div>

        <div id="visual-panel" class="flex-1 bg-gray-900 border border-gray-800 rounded-2xl flex flex-col justify-end relative overflow-hidden min-h-[380px] shadow-2xl transition-all duration-500 bg-cover bg-center">
            
            <div class="absolute inset-0 story-gradient pointer-events-none"></div>
            
            <div class="p-6 relative z-10 max-w-2xl mx-auto text-center">
                <p id="story-text" class="text-base md:text-lg text-gray-100 font-medium tracking-wide leading-relaxed filter drop-shadow-[0_2px_4px_rgba(0,0,0,1)]">
                    Memuat atmosfer cerita...
                </p>
            </div>
        </div>

        <div id="puzzle-panel" class="bg-gray-900 border border-gray-800 p-5 rounded-2xl flex flex-col gap-4 shadow-xl">
            <div class="border-b border-gray-800 pb-3 flex items-start gap-2">
                <span class="text-lg mt-0.5">🧩</span>
                <div>
                    <span class="text-xs font-bold uppercase tracking-widest text-amber-500">Teka-Teki Panel Bawah:</span>
                    <p id="puzzle-question" class="text-sm md:text-base text-gray-300 mt-1 font-mono font-semibold">Pertanyaan teka-teki...</p>
                </div>
            </div>

            <div id="choices-container" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                </div>
        </div>

    </div>

    <footer class="bg-gray-950 p-3 text-center text-xs text-gray-600 border-t border-gray-900">
        Goosebumps Interactive Engine v2.0 &copy; 2026
    </footer>

    <script>
        const databaseBuku = {
            buku1: {
                judul: "Rumah Berhantu Lereng Moga",
                startNode: "mulai",
                storyline: {
                    mulai: {
                        cerita: "Angin malam berderu kencang, menusuk tulang. Kamu terpaksa mendorong pintu kayu ek tebal sebuah rumah tua kolonial di lereng Moga yang gelap gulita. BRAAM! Pintu tiba-tiba membanting menutup keras di belakangmu oleh kekuatan tak kasat mata. Suasana mendadak senyap, menyisakan bau debu tua dan aroma anyir. Di depanmu, gembok rantai kuno digital di pintu ruang bawah tanah berkedip merah terang memancarkan kode teka-teki.",
                        tekaTeki: "Gembok memancarkan deret angka ganjil mistis: 3, 9, 27, ... Berapa angka logis selanjutnya untuk menjebol pintu sebelum hantu koridor terbangun?",
                        visualUrl: "https://images.unsplash.com/photo-1505635552518-3448ff116af3?q=80&w=800&auto=format&fit=crop", // Gambar koridor rumah tua berhantu
                        pilihan: [
                            { teks: "Masukan kode '81' (Terobos ke Bawah Tanah)", targetNode: "bawah_tanah" },
                            { teks: "Masukan kode '54' (Asal tebak kombinasi)", targetNode: "gameover_gembok" },
                            { teks: "Lari naik ke tangga lantai atas yang rapuh", targetNode: "lantai_atas" }
                        ]
                    },
                    bawah_tanah: {
                        cerita: "KLIK! Rantai besi terlepas dan jatuh berdentang ke lantai batu. Kamu melesat turun ke ruang bawah tanah yang dingin bagai es. Di tengah ruangan, sebuah peti kayu dilapisi medan pelindung laser kuno mengunci sebuah kunci emas. Di atas monitor tabung berdebu, muncul tulisan bercahaya: 'Kurangi harga mutlak 25 dari 125, lalu bagi hasilnya dengan angka prima terkecil'. Hawa dingin di belakang lehermu kian mencekam!",
                        tekaTeki: "Berapakah hasil operasi matematika tersebut untuk mematikan laser pelindung?",
                        visualUrl: "https://images.unsplash.com/photo-1519074069444-1ba4e666440e?q=80&w=800&auto=format&fit=crop", // Gambar ruang bawah tanah gelap/lab misterius
                        pilihan: [
                            { teks: "Ketik kode '50'", targetNode: "tamat_menang" },
                            { teks: "Ketik kode '33'", targetNode: "gameover_laser" }
                        ]
                    },
                    lantai_atas: {
                        cerita: "Kamu memaksakan kaki melompati anak tangga kayu yang lapuk. KREEEAK!! Kayu tumpuanmu patah. Tubuhmu meluncur jatuh bebas ke kegelapan hampa di bawah lantai dasar. Jeritanmu teredam oleh kabut malam, dan kamu tersadar kamu telah masuk ke dalam lingkaran ilusi waktu tanpa akhir.",
                        tekaTeki: "GAME OVER - Kamu gagal memilih rute aman.",
                        visualUrl: "https://images.unsplash.com/photo-1513542789411-b6a5d4f31634?q=80&w=800&auto=format&fit=crop", // Gambar tangga hancur/kegelapan
                        pilihan: [
                            { teks: "🔄 Coba Lagi Buku Ini", targetNode: "mulai" }
                        ]
                    },
                    gameover_gembok: {
                        cerita: "TIIIUUT! Alarm berbunyi melengking. Salah memasukkan kode memicu gembok menyemburkan uap gas beracun berwarna hijau pekat. Pandanganmu mengabur, lututmu lemas, dan kesadaranmu direnggut sepenuhnya menjadi penghuni abadi rumah lereng Moga.",
                        tekaTeki: "GAME OVER - Gas beracun melumpuhkanmu.",
                        visualUrl: "https://images.unsplash.com/photo-1578328819058-b69f3a3b0f6b?q=80&w=800&auto=format&fit=crop", // Gambar uap/kabut merah/hijau misterius
                        pilihan: [
                            { teks: "🔄 Coba Lagi Buku Ini", targetNode: "mulai" }
                        ]
                    },
                    gameover_laser: {
                        cerita: "ZAPPP! Alarm berdengung kencang, laser merah menyengat pergelangan tanganmu. Pintu besi otomatis menutup dari atas menghimpit ruangan. Kamu terjebak di ruang bawah tanah selamanya karena gagal mendapatkan kunci keselamatan.",
                        tekaTeki: "GAME OVER - Perhitunganmu keliru fatal.",
                        visualUrl: "https://images.unsplash.com/photo-1555664424-778a1e5e1b48?q=80&w=800&auto=format&fit=crop", // Gambar sirkuit/error/laser
                        pilihan: [
                            { teks: "🔄 Coba Lagi Buku Ini", targetNode: "mulai" }
                        ]
                    },
                    tamat_menang: {
                        cerita: "BZZZT! Laser padam. Kamu menyambar kunci emas dan membuka pintu rahasia di balik dinding batu. Sinar matahari pagi langsung menyambut wajahmu yang pucat. Kamu berhasil lolos dari teror rumah Moga dengan selamat dan membawa pulang kisah paling gila abad ini!",
                        tekaTeki: "TAMAT - Selamat, Logika STEM menyelamatkanmu!",
                        visualUrl: "https://images.unsplash.com/photo-1509114397022-ed747cca3f65?q=80&w=800&auto=format&fit=crop", // Gambar hutan/matahari terbit indah
                        pilihan: [
                            { teks: "🎉 Mainkan Buku Lainnya", targetNode: "EXIT_GAME" }
                        ]
                    }
                }
            },
            buku2: {
                judul: "Ekspedisi Lembah Purba",
                startNode: "mulai",
                storyline: {
                    mulai: {
                        cerita: "Langkah penjelajahanmu berakhir petaka saat tanah yang kamu injak runtuh! Kamu terperosok puluhan meter jatuh ke lembah purba tersembunyi. Saat membuka mata, detak jantungmu seolah berhenti melihat seekor T-Rex raksasa sedang tidur mendengkur beberapa meter di depanmu. Di sisi kanan, ada gerbang batu kuno mekanis dengan roda gigi berat yang bisa berputar, membutuhkan beban penyeimbang seimbang.",
                        tekaTeki: "Ada buah purba bermassa total 60 kg. Jika hukum tuas mekanis mengharuskan buah dipotong menjadi 4 bagian sama besar, berapa berat 2 potong buah untuk penyeimbang gerbang?",
                        visualUrl: "https://images.unsplash.com/photo-1535083783855-76ae62b2914e?q=80&w=800&auto=format&fit=crop", // Gambar hutan belantara purba/dino
                        pilihan: [
                            { teks: "Taruh potongan seberat '30 kg' di tuas", targetNode: "hutan_aman" },
                            { teks: "Nekat memanjat tebing batu di atas T-Rex", targetNode: "gameover_trex" }
                        ]
                    },
                    hutan_aman: {
                        cerita: "KREEEAK! Berat 30 kg sangat pas! Pintu batu kuno terangkat perlahan tanpa menimbulkan suara berisik yang bisa membangunkan sang predator. Kamu menyelinap masuk ke dalam lorong batu gua dan menemukan sebuah komputer navigasi peninggalan peradaban maju yang terdampar. Layar memancarkan sandi biner digital: '0110 dalam biner sama dengan angka berapa di dunia manusia?'",
                        tekaTeki: "Konversikan bilangan biner komputer kuno tersebut ke angka desimal untuk memicu portal pulang!",
                        visualUrl: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=800&auto=format&fit=crop", // Gambar gerbang teknologi/ruang futuristik kuno
                        pilihan: [
                            { teks: "Input angka '6'", targetNode: "tamat_selamat" },
                            { teks: "Input angka '4'", targetNode: "gameover_gua" }
                        ]
                    },
                    gameover_trex: {
                        cerita: "KRAKK! Kamu tidak sengaja menginjak ranting kering saat memanjat. Mata kuning raksasa T-Rex langsung terbuka lebar menatap lurus ke arahmu. Dengan sekali ayunan ekor, kamu terlempar jatuh kembali ke sarangnya. Tamat sudah riwayatmu.",
                        tekaTeki: "GAME OVER - Pergerakanmu membangunkan sang monster.",
                        visualUrl: "https://images.unsplash.com/photo-1516426122078-c23e76319801?q=80&w=800&auto=format&fit=crop", // Gambar mata hewan predator/bahaya
                        pilihan: [
                            { teks: "🔄 Coba Lagi Buku Ini", targetNode: "mulai" }
                        ]
                    },
                    gameover_gua: {
                        cerita: "BEEEP! 'Akses Ditolak!' Kode salah memicu sistem pertahanan gua runtuh. Batuan masif seberat berton-ton jatuh menutup jalur keluar. Kamu terperangkap di kegelapan abadi zaman prasejarah.",
                        tekaTeki: "GAME OVER - Gagal memecahkan sandi konversi biner.",
                        visualUrl: "https://images.unsplash.com/photo-1507146426996-ef05306b995a?q=80&w=800&auto=format&fit=crop", // Gambar reruntuhan batu/gelap gua
                        pilihan: [
                            { teks: "🔄 Coba Lagi Buku Ini", targetNode: "mulai" }
                        ]
                    },
                    tamat_selamat: {
                        cerita: "SINGGG! Komputer berdengung pelan, lingkaran portal cahaya dimensi terbuka lebar di depanmu. Tanpa berpikir panjang kamu melompat masuk dan mendarat di rerumputan bukit desamu yang damai. Kamu berhasil selamat berkat keahlian analisismu!",
                        tekaTeki: "TAMAT - Selamat! Kamu berhasil menaklukkan Lembah Purba!",
                        visualUrl: "https://images.unsplash.com/photo-1464802686167-b939a6910659?q=80&w=800&auto=format&fit=crop", // Gambar bintang/galaksi/portal fiksi ilmiah
                        pilihan: [
                            { teks: "🎉 Mainkan Buku Lainnya", targetNode: "EXIT_GAME" }
                        ]
                    }
                }
            }
        };

        let bukuAktif = null;
        let nodeAktif = "";

        function startBook(bookKey) {
            bukuAktif = databaseBuku[bookKey];
            nodeAktif = bukuAktif.startNode;

            document.getElementById('book-selection-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('game-title').innerText = `Goosebumps: ${bukuAktif.judul}`;

            renderState();
        }

        function renderState() {
            const currentData = bukuAktif.storyline[nodeAktif];

            // 1. Update Teks Cerita & Teka-Teki
            document.getElementById('story-text').innerText = currentData.cerita;
            document.getElementById('puzzle-question').innerText = currentData.tekaTeki;

            // 2. Fitur Visual Otomatis: Ganti Gambar Background Panel Utama sesuai Alur Node
            const visualPanel = document.getElementById('visual-panel');
            if (currentData.visualUrl) {
                visualPanel.style.backgroundImage = `url('${currentData.visualUrl}')`;
            } else {
                visualPanel.style.backgroundImage = "none";
            }

            // 3. Render Tombol Pilihan Jawaban
            const choicesContainer = document.getElementById('choices-container');
            choicesContainer.innerHTML = '';

            currentData.pilihan.forEach(opsi => {
                const btn = document.createElement('button');
                btn.className = "p-3 rounded-xl border bg-gray-950/70 backdrop-blur-sm text-left text-xs md:text-sm font-medium transition-all duration-200 cursor-pointer hover:bg-green-950/60 border-gray-800 hover:border-green-500 hover:scale-[1.02] hover:shadow-lg hover:shadow-green-950/20";
                btn.innerText = opsi.teks;
                
                btn.onclick = () => {
                    if(opsi.targetNode === "EXIT_GAME") {
                        exitGame();
                    } else {
                        nodeAktif = opsi.targetNode;
                        renderState();
                    }
                };
                choicesContainer.appendChild(btn);
            });
        }

        function exitGame() {
            bukuAktif = null;
            nodeAktif = "";
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('book-selection-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
